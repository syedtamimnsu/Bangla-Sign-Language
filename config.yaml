base_dir: .
subset:
  video_dir: ${base_dir}
  csv_path: ${base_dir}/subset_mapping.csv
features:
  output_dir: ${base_dir}/features
training:
  data_path: ${base_dir}/features
  feature_dirs:
    merged: merged_features
  vocab_size: 500
  max_seq_len: 30
  output_dir: ${base_dir}/processed_data
  tokenizer_path: ${base_dir}/processed_data/custom_tokenizer.json
  model_dir: ${base_dir}/model_checkpoints
  model_save_path: ${base_dir}/cslr_model.pth
  input_dim: 3707  # 1659 (MediaPipe) + 2048 (I3D-ResNet50)
  output_dim: 500
  hid_dim: 256
  n_layers: 2
  n_heads: 4
  pf_dim: 512
  dropout: 0.1
  learning_rate: 0.0003
  batch_size: 4
  num_epochs: 20
  teacher_forcing_ratio: 0.5
  grad_clip: 1.0
  use_cuda: true
  seed: 42 
logging:
  level: INFO
  file: ${base_dir}/pipeline.log
